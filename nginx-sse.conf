# Sample Nginx config for MekongAI SSE streaming (disable buffering)

upstream mekong_ui {
    server 127.0.0.1:3001;
}

upstream mekong_api {
    server 127.0.0.1:1979;
}

server {
    listen 80;
    server_name your.domain.com;

    # Disable gzip globally to avoid chunk coalescing for SSE
    gzip off;

    location / {
        proxy_pass http://mekong_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Explicitly disable buffering and caching for SSE streaming endpoints
    location ~* ^/api/v1/(chatbot-custom-prompt-stream|chatbot-chart-stream|chatbot-basic-stream|chatbot-reference-stream|agent-kat-stream|agent-province-merger-stream)$ {
        proxy_pass http://mekong_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        send_timeout 600s;
        proxy_set_header X-Accel-Buffering no;
        add_header Cache-Control "no-cache";
        add_header X-Accel-Buffering "no";
        gzip off;
    }

    # Other API routes
    location /api/ {
        proxy_pass http://mekong_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
    }
}